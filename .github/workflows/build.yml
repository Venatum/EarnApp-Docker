name: Build & Push Docker Images

on:
  workflow_dispatch:
  push:
    branches: [master]
  schedule:
    - cron: "0 1 * * *" # Daily at 1:00 UTC

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get EarnApp version
        id: version
        run: |
          wget -cq https://brightdata.com/static/earnapp/bin_64 -O ./earnapp
          chmod a+x ./earnapp
          VERSION=$(./earnapp --version | tr -cd '[:print:]' | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: app
            tags: |
              venatum/earnapp:latest
              venatum/earnapp:${{ needs.version.outputs.version }}
            platforms: linux/amd64,linux/arm/v7,linux/arm64
          - variant: lite
            tags: |
              venatum/earnapp:lite
              venatum/earnapp:lite-${{ needs.version.outputs.version }}
            platforms: linux/amd64,linux/arm/v7,linux/arm64
          - variant: debian
            tags: |
              venatum/earnapp:debian
              venatum/earnapp:debian-${{ needs.version.outputs.version }}
            platforms: linux/amd64,linux/arm/v7,linux/arm/v6,linux/arm64
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v7
        with:
          context: build
          file: build/${{ matrix.variant }}/Dockerfile
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ matrix.tags }}

